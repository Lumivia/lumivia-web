<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#0F172A" />
  
  <defs>
    <linearGradient id="lumiViaGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D2FF" />
      <stop offset="100%" stop-color="#E9B872" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(10, 10) scale(0.96)" opacity="0.8">
    <path d="M 150 352 Q 256 352 362 160" 
          fill="none" 
          stroke="url(#lumiViaGrad)" 
          stroke-width="36" 
          stroke-linecap="round" />
    
    <circle cx="150" cy="352" r="24" fill="#0F172A" stroke="#00D2FF" stroke-width="10" />
    
    <circle cx="362" cy="160" r="28" fill="#E9B872" filter="url(#glow)" />
    <circle cx="362" cy="160" r="12" fill="#FFFFFF" />
  </g>

  <text x="256" y="290" 
        font-family="Cambo, 'Bodoni MT', Didot, 'Times New Roman', serif" 
        font-size="160" 
        font-weight="bold" 
        fill="url(#lumiViaGrad)" 
        text-anchor="middle" 
        letter-spacing="-10"
        filter="url(#glow)">
    LV
  </text>
</svg>
